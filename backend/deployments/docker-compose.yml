services:
  postgres:
    image: postgres:16-alpine
    container_name: bakerio-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bakerio_network
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${PWD}/../db/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      - -verbose
      - up
    networks:
      - bakerio_network
    restart: on-failure

  redis:
    image: redis:7-alpine
    container_name: bakerio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bakerio_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bakerio-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bakerio_network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: bakerio-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - bakerio_network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: bakerio-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bakerio_network
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bakerio-app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SERVER_ENV: ${SERVER_ENV}
      SERVER_PORT: ${SERVER_PORT}
      GIN_MODE: release
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      EMAIL_HOST: mailhog
      EMAIL_PORT: 1025
      EMAIL_USER: ""
      EMAIL_PASSWORD: ""
      EMAIL_FROM: bakerio@example.com
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    networks:
      - bakerio_network
    restart: unless-stopped

  # k6 — load/race tester. Off by default (profile=test). Run with:
  #   make k6-smoke    (one VU, one iteration through find → select → confirm)
  #   make k6-load     (sustained ramped load)
  #   make k6-race     (many concurrent confirms on a pinned-low-stock SKU)
  # By default it hits the host's app over `host.docker.internal:8080`, which
  # matches `make run` on the dev machine. Override BAKERIO_BASE_URL in the
  # Makefile or shell to point at the in-compose `app` service instead.
  k6:
    image: grafana/k6:0.49.0
    profiles: ["test"]
    environment:
      BAKERIO_BASE_URL: ${BAKERIO_BASE_URL:-http://host.docker.internal:8080}
      BAKERIO_PASSWORD: ${BAKERIO_PASSWORD:-123456}
    volumes:
      - ${PWD}/../tests/k6:/scripts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bakerio_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  bakerio_network:
    driver: bridge
