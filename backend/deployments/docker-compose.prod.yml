services:
  postgres:
    image: postgres:16-alpine
    container_name: bakerio-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bakerio_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bakerio-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bakerio_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: bakerio-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bakerio_network
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../db/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      - up
    networks:
      - bakerio_network
    restart: on-failure

  app:
    image: ${DOCKER_USERNAME}/bakerio:latest
    container_name: bakerio-app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_ENV: production
      SERVER_PORT: ${SERVER_PORT}
      GIN_MODE: release
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    networks:
      - bakerio_network
    restart: unless-stopped

  order:
    image: ${DOCKER_USERNAME}/bakerio-order:latest
    container_name: bakerio-order
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
    ports:
      - "3001:3000"
    networks:
      - bakerio_network
    restart: unless-stopped

  admin:
    image: ${DOCKER_USERNAME}/bakerio-admin:latest
    container_name: bakerio-admin
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
    ports:
      - "3002:3000"
    networks:
      - bakerio_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: bakerio-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - order
      - admin
    networks:
      - bakerio_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  bakerio_network:
    driver: bridge
