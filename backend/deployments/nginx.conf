events {
    worker_connections 1024;
}

http {
    # Rate limiting zone for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Global security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval' *.thinhuit.id.vn;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    upstream backend {
        server app:8080;
    }
    upstream minio {
        server minio:9000;
    }
    upstream order {
        server order:3000;
    }
    upstream admin {
        server admin:3000;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name api.bakerio.thinhuit.id.vn order.bakerio.thinhuit.id.vn admin.bakerio.thinhuit.id.vn;
        return 301 https://$host$request_uri;
    }

    # API
    server {
        listen 443 ssl;
        server_name api.bakerio.thinhuit.id.vn;

        ssl_certificate /etc/letsencrypt/live/bakerio.thinhuit.id.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bakerio.thinhuit.id.vn/privkey.pem;

        location /uploads/ {
            proxy_pass http://minio/uploads/;
            proxy_set_header Host $host;
        }

        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Order app
    server {
        listen 443 ssl;
        server_name order.bakerio.thinhuit.id.vn;

        ssl_certificate /etc/letsencrypt/live/bakerio.thinhuit.id.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bakerio.thinhuit.id.vn/privkey.pem;

        location / {
            proxy_pass http://order;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Admin app
    server {
        listen 443 ssl;
        server_name admin.bakerio.thinhuit.id.vn;

        ssl_certificate /etc/letsencrypt/live/bakerio.thinhuit.id.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bakerio.thinhuit.id.vn/privkey.pem;

        location / {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
