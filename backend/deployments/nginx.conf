events {
    worker_connections 1024;
}

http {
    upstream backend {
        server app:${SERVER_PORT};
    }
    upstream order {
        server order:3000;
    }
    upstream admin {
        server admin:3000;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name order.bakerio.vn admin.bakerio.vn api.bakerio.vn;
        return 301 https://$host$request_uri;
    }

    # API
    server {
        listen 443 ssl;
        server_name api.bakerio.vn;

        ssl_certificate /etc/letsencrypt/live/bakerio.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bakerio.vn/privkey.pem;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Order app
    server {
        listen 443 ssl;
        server_name order.bakerio.vn;

        ssl_certificate /etc/letsencrypt/live/bakerio.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bakerio.vn/privkey.pem;

        location / {
            proxy_pass http://order;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Admin app
    server {
        listen 443 ssl;
        server_name admin.bakerio.vn;

        ssl_certificate /etc/letsencrypt/live/bakerio.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bakerio.vn/privkey.pem;

        location / {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
