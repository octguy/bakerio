name: bakerio-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: bakeriodb
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d bakeriodb"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - bakerio_test

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../db/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://testuser:testpass@postgres:5432/bakeriodb?sslmode=disable
      - up
    networks:
      - bakerio_test

  seed:
    image: postgres:16-alpine
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: testpass
    command: >
      sh -c "psql -h postgres -U testuser -d bakeriodb -v ON_ERROR_STOP=1
      -c \"INSERT INTO branch.branches (id, name, address, lat, lng, status) VALUES
      ('00000000-0000-0000-0000-000000000101', 'Bakerio Quận 1', '65 Lê Lợi, Quận 1', 10.773800, 106.703000, 'active'),
      ('00000000-0000-0000-0000-000000000102', 'Bakerio Hoàn Kiếm', '12 Hàng Bài, Hoàn Kiếm', 21.024500, 105.853800, 'active'),
      ('00000000-0000-0000-0000-000000000103', 'Bakerio Phú Nhuận', '100 Phan Xích Long', 10.800700, 106.680500, 'active')
      ON CONFLICT (id) DO UPDATE SET name = EXCLUDED.name, address = EXCLUDED.address, lat = EXCLUDED.lat, lng = EXCLUDED.lng, status = EXCLUDED.status;\"
      -c \"INSERT INTO product.categories (id, name, slug, sort_order, is_active) VALUES
      ('00000000-0000-0000-0000-000000000201', 'Cakes', 'cakes', 1, true),
      ('00000000-0000-0000-0000-000000000202', 'Pastries', 'pastries', 2, true)
      ON CONFLICT (id) DO UPDATE SET name = EXCLUDED.name, slug = EXCLUDED.slug, sort_order = EXCLUDED.sort_order, is_active = EXCLUDED.is_active;\""
    networks:
      - bakerio_test

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - bakerio_test

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - bakerio_test

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_ENV: test
      SERVER_PORT: 8080
      GIN_MODE: release
      JWT_SECRET: test-ci-secret
      JWT_EXPIRY: 1h
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: testuser
      DB_PASSWORD: testpass
      DB_NAME: bakeriodb
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      EMAIL_HOST: localhost
      EMAIL_PORT: 1025
      EMAIL_USER: ""
      EMAIL_PASSWORD: ""
      EMAIL_FROM: bakerio@example.com
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: bakerio-test
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: http://localhost:9000
    ports:
      - "${TEST_API_PORT:-8080}:8080"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      - bakerio_test

networks:
  bakerio_test:
    driver: bridge
