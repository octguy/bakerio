version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/auth"
    schema: "db/migrations"
    gen:
      go:
        package: "authdb"
        out: "db/sqlc/auth"
        emit_json_tags: true
        emit_empty_slices: true
        sql_package: "pgx/v5"
        overrides: &overrides
          - db_type: "timestamptz"
            go_type: { import: "time", type: "Time" }
          - db_type: "timestamptz"
            nullable: true
            go_type: { import: "time", type: "Time", pointer: true }
          - db_type: "timestamp"
            go_type: { import: "time", type: "Time" }
          - db_type: "timestamp"
            nullable: true
            go_type: { import: "time", type: "Time", pointer: true }
          - db_type: "varchar"
            go_type: "string"
          - db_type: "varchar"
            nullable: true
            go_type: { type: "string", pointer: true }
          - db_type: "pg_catalog.varchar"
            go_type: "string"
          - db_type: "pg_catalog.varchar"
            nullable: true
            go_type: { type: "string", pointer: true }
          - db_type: "text"
            go_type: "string"
          - db_type: "text"
            nullable: true
            go_type: { type: "string", pointer: true }
          - db_type: "uuid"
            go_type: { import: "github.com/google/uuid", type: "UUID" }
          - db_type: "uuid"
            nullable: true
            go_type: { import: "github.com/google/uuid", type: "UUID", pointer: true }
          - column: "branch.branches.lat"
            go_type: { type: "float64", pointer: true}
          - column: "branch.branches.lng"
            go_type: { type: "float64", pointer: true}
          - column: "product.products.price"
            go_type: { import: "github.com/shopspring/decimal", type: "Decimal" }
          - column: "cart.cart_items.unit_price_snap"
            go_type: { import: "github.com/shopspring/decimal", type: "Decimal" }
          - column: "orders.orders.subtotal"
            go_type: { import: "github.com/shopspring/decimal", type: "Decimal" }
          - column: "orders.orders.discount_total"
            go_type: { import: "github.com/shopspring/decimal", type: "Decimal" }
          - column: "orders.orders.shipping_fee"
            go_type: { import: "github.com/shopspring/decimal", type: "Decimal" }
          - column: "orders.orders.total"
            go_type: { import: "github.com/shopspring/decimal", type: "Decimal" }
          - column: "orders.orders.shipping_latitude"
            go_type: { type: "float64", pointer: true }
          - column: "orders.orders.shipping_longitude"
            go_type: { type: "float64", pointer: true }
          - column: "orders.order_items.unit_price_snap"
            go_type: { import: "github.com/shopspring/decimal", type: "Decimal" }
          - column: "orders.order_items.line_total"
            go_type: { import: "github.com/shopspring/decimal", type: "Decimal" }
          - column: "users.addresses.latitude"
            go_type: "float64"
          - column: "users.addresses.longitude"
            go_type: "float64"
          - column: "voucher.vouchers.max_discount"
            go_type: { import: "github.com/shopspring/decimal", type: "Decimal", pointer: true }
          - column: "voucher.vouchers.min_subtotal"
            go_type: { import: "github.com/shopspring/decimal", type: "Decimal", pointer: true }
          - column: "voucher.redemptions.discount_amount"
            go_type: { import: "github.com/shopspring/decimal", type: "Decimal" }

  - engine: "postgresql"
    queries: "db/queries/users"
