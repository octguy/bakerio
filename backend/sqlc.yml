version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/auth"
    schema: "db/migrations"
    gen:
      go:
        package: "authdb"
        out: "db/sqlc/auth"
        emit_json_tags: true
        emit_empty_slices: true
        sql_package: "pgx/v5"
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamp"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

  - engine: "postgresql"
    queries: "db/queries/profile"
    schema: "db/migrations"
    gen:
      go:
        package: "profiledb"
        out: "db/sqlc/profile"
        emit_json_tags: true
        emit_empty_slices: true
        sql_package: "pgx/v5"
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamp"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"