[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    auth: auth/login/register/verify endpoints
    users: /users admin endpoints
    profile: /profile self endpoints
    branch: /branch endpoints
    categories: /categories endpoints
    products: /products endpoints (incl. images, prices)
    suppliers: /suppliers endpoints
    procurement: /procurement endpoints
    rbac: role-based access control matrix
    slow: tests that hit multiple endpoints sequentially
