  /staff:
    get:
      description: Search non-customer accounts. Admin sees all branches; a branch_manager
        is scoped to their own branch.
      parameters:
      - description: Email or display name (ILIKE %q%)
        in: query
        name: q
        type: string
      - description: Filter by exact staff role (branch_manager, branch_staff, product_manager,
          …)
        in: query
        name: role
        type: string
      - description: Filter by branch UUID — ignored for branch_manager callers (forced
          to own branch)
        in: query
        name: branch_id
        type: string
      - description: Default true on /staff. Set false to include customers/guests
          in the result
        in: query
        name: staff_only
        type: boolean
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: size
        type: integer
