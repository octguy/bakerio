      description: |-
        Send one or more files under the "files" form field. Optional
        repeated "alt_text" fields are matched to files by position.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      - description: Image files (repeatable)
        in: formData
        name: files
        required: true
        type: file
      - description: Alt text per file (repeatable)
        in: formData
        name: alt_text
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            items:
              $ref: '#/definitions/ProductImageResponse'
