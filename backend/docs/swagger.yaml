basePath: /api/v1
definitions:
  AddItemRequest:
    properties:
      product_id:
        type: string
      quantity:
        maximum: 99
        minimum: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  AssignMemberRequest:
    properties:
      user_id:
        type: string
    required:
    - user_id
    type: object
  BranchBrief:
    properties:
      address:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  BranchListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/BranchResponse'
        type: array
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  BranchMembersResponse:
    properties:
      branch_id:
        type: string
      members:
        items:
          $ref: '#/definitions/MemberInfo'
        type: array
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  BranchProductResponse:
    properties:
      branch_id:
        type: string
      is_active:
        type: boolean
      product_id:
        type: string
    type: object
  BranchResponse:
    properties:
      address:
        type: string
      created_at:
        type: string
      id:
        type: string
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      status:
        type: string
    type: object
  CartItemResponse:
    properties:
      available:
        type: boolean
      id:
        type: string
      line_total:
        type: number
      name:
        type: string
      price:
        type: number
      product_id:
        type: string
      quantity:
        type: integer
    type: object
  CartResponse:
    properties:
      count:
        type: integer
      items:
        items:
          $ref: '#/definitions/CartItemResponse'
        type: array
      total:
        type: number
    type: object
  CategoryResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      slug:
        type: string
      sort_order:
        type: integer
      updated_at:
        type: string
    type: object
  ChangePasswordRequest:
    properties:
      current_password:
        minLength: 6
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  CreateBranchRequest:
    properties:
      address:
        type: string
      lat:
        maximum: 90
        minimum: -90
        type: number
      lng:
        maximum: 180
        minimum: -180
        type: number
      name:
        maxLength: 100
        type: string
    required:
    - address
    - name
    type: object
  CreateCategoryRequest:
    properties:
      name:
        maxLength: 100
        type: string
      sort_order:
        type: integer
    required:
    - name
    type: object
  CreateProductRequest:
    properties:
      category_id:
        type: string
      name:
        maxLength: 100
        type: string
      price:
        type: number
      sort_order:
        type: integer
    required:
    - category_id
    - name
    - price
    type: object
  CreateRoleRequest:
    properties:
      description:
        type: string
      name:
        maxLength: 50
        type: string
    required:
    - name
    type: object
  CreateUserRequest:
    properties:
      branch_id:
        type: string
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        type: string
    required:
    - email
    - full_name
    - password
    - role
    type: object
  CreateUserResponse:
    properties:
      branch:
        $ref: '#/definitions/BranchBrief'
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      role:
        type: string
    type: object
  ErrorResponse:
    properties:
      error:
        properties:
          code:
            type: string
          message:
            type: string
        type: object
    type: object
  LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  LoginResponse:
    properties:
      access_token:
        type: string
    type: object
  MemberInfo:
    properties:
      display_name:
        type: string
      email:
        type: string
      roles:
        items:
          type: string
        type: array
      user_id:
        type: string
    type: object
  PermissionResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  ProductImageResponse:
    properties:
      alt_text:
        type: string
      id:
        type: string
      product_id:
        type: string
      sort_order:
        type: integer
      url:
        type: string
    type: object
  ProductListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/ProductResponse'
        type: array
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  ProductResponse:
    properties:
      category_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: number
      slug:
        type: string
      sort_order:
        type: integer
      updated_at:
        type: string
    type: object
  ProfileResponse:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      branch:
        $ref: '#/definitions/BranchBrief'
      display_name:
        type: string
      id:
        type: string
      phone:
        type: string
      roles:
        description: |-
          Staff-only enrichment. Omitted for plain customers so their response
          stays unchanged.
        items:
          type: string
        type: array
      user_id:
        type: string
    type: object
  RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  RegisterResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
    type: object
  RoleResponse:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  SeedDemoSummary:
    properties:
      branch_products:
        description: (product × branch) availability rows
        type: integer
      branches:
        description: number of branches now in DB
        type: integer
      categories:
        description: number of categories now in DB
        type: integer
      customers:
        description: number of customer accounts
        type: integer
      products:
        description: number of products now in DB
        type: integer
      skipped:
        description: true if branches already existed → no inserts done
        type: boolean
      staff:
        description: managers + staff combined
        type: integer
    type: object
  SetAvailabilityRequest:
    properties:
      is_active:
        type: boolean
    type: object
  SetPasswordRequest:
    properties:
      password:
        minLength: 6
        type: string
    required:
    - password
    type: object
  UpdateBranchRequest:
    properties:
      address:
        type: string
      lat:
        maximum: 90
        minimum: -90
        type: number
      lng:
        maximum: 180
        minimum: -180
        type: number
      name:
        maxLength: 100
        type: string
    type: object
  UpdateCategoryRequest:
    properties:
      is_active:
        type: boolean
      name:
        maxLength: 100
        type: string
      sort_order:
        type: integer
    required:
    - name
    type: object
  UpdateItemRequest:
    properties:
      quantity:
        maximum: 99
        minimum: 1
        type: integer
    required:
    - quantity
    type: object
  UpdateProductRequest:
    properties:
      category_id:
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        type: string
      price:
        type: number
      sort_order:
        type: integer
    required:
    - category_id
    - name
    - price
    type: object
  UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      display_name:
        type: string
      phone:
        type: string
    type: object
  UpdateRolePermissionsRequest:
    properties:
      permission_ids:
        items:
          type: string
        type: array
    required:
    - permission_ids
    type: object
  UpdateRoleRequest:
    properties:
      description:
        type: string
      name:
        maxLength: 50
        type: string
    required:
    - name
    type: object
  UpdateStatusRequest:
    properties:
      status:
        enum:
        - active
        - inactive
        type: string
    required:
    - status
    type: object
  UserListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/UserSummary'
        type: array
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  UserSummary:
    properties:
      branch_id:
        type: string
      display_name:
        type: string
      email:
        type: string
      roles:
        items:
          type: string
        type: array
      user_id:
        type: string
    type: object
  VerifyEmailRequest:
    properties:
      otp:
        type: string
      user_id:
        type: string
    required:
    - otp
    - user_id
    type: object
  VerifyEmailResponse:
    properties:
      message:
        type: string
      verified:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: Bakerio bakery marketplace backend API.
  title: Bakerio API
  version: "1.0"
paths:
  /admin/seed-demo:
    post:
      description: 'Populates branches, categories, products, customers, and staff
        for manual API testing. Idempotent: if any branch exists, the call is a no-op
        and `skipped` is true. Super-admin only.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SeedDemoSummary'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Seed sample data (admin)
      tags:
      - dev
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT access token
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/LoginResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Invalidates the current JWT by adding it to the Redis blacklist
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/password:
    patch:
      consumes:
      - application/json
      description: Changes the authenticated user's password after verifying the current
        one
      parameters:
      - description: Change password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change own password
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account and profile in a single transaction
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/RegisterResponse'
        "409":
          description: Email already taken
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /auth/verify:
    post:
      consumes:
      - application/json
      description: Verifies a user's email using the 6-digit OTP sent after registration
      parameters:
      - description: Verify email payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/VerifyEmailResponse'
        "400":
          description: Invalid or expired OTP
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Verify email address
      tags:
      - auth
  /branch:
    get:
      parameters:
      - description: Search name or address (ILIKE %q%)
        in: query
        name: q
        type: string
      - description: Filter by exact status (e.g. active, inactive)
        in: query
        name: status
        type: string
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BranchListResponse'
      summary: List / search branches
      tags:
      - branch
    post:
      consumes:
      - application/json
      description: Add a new branch to the system
      parameters:
      - description: Create branch request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateBranchRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/BranchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create branch
      tags:
      - branch
  /branch/{id}:
    get:
      description: Retrieve a single branch by its UUID
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BranchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get branch by ID
      tags:
      - branch
    patch:
      consumes:
      - application/json
      description: Update details of an existing branch
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      - description: Update branch request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateBranchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BranchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update branch
      tags:
      - branch
  /branch/{id}/members:
    get:
      description: Members of a branch. Admin sees any branch; a branch_manager only
        their own.
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BranchMembersResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: List branch members (paginated)
      tags:
      - branch
    post:
      consumes:
      - application/json
      description: Assign (or move) a user to a branch. Admin may target any branch;
        a branch_manager only their own.
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      - description: User to assign
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/AssignMemberRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/MemberInfo'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Assign a member to a branch
      tags:
      - branch
  /branch/{id}/members/{userId}:
    delete:
      description: Remove a user's membership. Admin may target any branch; a branch_manager
        only their own.
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove a member from a branch
      tags:
      - branch
  /branch/{id}/products/{productId}:
    put:
      consumes:
      - application/json
      description: Admin may target any branch; a branch_manager only their own.
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      - description: Product ID
        in: path
        name: productId
        required: true
        type: string
      - description: Availability
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/SetAvailabilityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BranchProductResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Toggle product availability at a branch
      tags:
      - product
  /branch/{id}/status:
    patch:
      consumes:
      - application/json
      description: Activate or deactivate a branch
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      - description: Update status request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update branch status
      tags:
      - branch
  /cart:
    delete:
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Empty the cart
      tags:
      - cart
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CartResponse'
      security:
      - BearerAuth: []
      summary: Get the current user's cart
      tags:
      - cart
  /cart/items:
    post:
      consumes:
      - application/json
      description: Upserts; quantity sums on conflict (capped at 99).
      parameters:
      - description: Item
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/AddItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CartResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add an item to the cart
      tags:
      - cart
  /cart/items/{itemId}:
    delete:
      parameters:
      - description: Cart item ID
        in: path
        name: itemId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CartResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove a single item from the cart
      tags:
      - cart
    patch:
      consumes:
      - application/json
      description: Sets the quantity of a single cart item. Use DELETE to remove.
      parameters:
      - description: Cart item ID
        in: path
        name: itemId
        required: true
        type: string
      - description: Quantity
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CartResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update an item's quantity
      tags:
      - cart
  /categories:
    get:
      parameters:
      - description: Search name or slug (ILIKE %q%)
        in: query
        name: q
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/CategoryResponse'
            type: array
      summary: List / search categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      parameters:
      - description: Create category payload
        in: body
        name: request
        required: true
        schema:
