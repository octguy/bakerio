      summary: Get an order by id (scoped by caller's role)
      tags:
      - orders
  /orders/confirm:
    post:
      consumes:
      - application/json
      description: 'Pops the session (exactly-once: double-tap returns SESSION_EXPIRED),
        atomically locks + decrements stock, writes the order rows. Stock race loss
        returns 409 STOCK_CONFLICT — client should re-route via /orders/find-branches.'
      parameters:
      - description: Session reference
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ConfirmOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/OrderResponse'
        "403":
          description: session belongs to another user
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: STOCK_CONFLICT
          schema:
            $ref: '#/definitions/ErrorResponse'
        "410":
          description: SESSION_EXPIRED (expired or already used)
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Place the order from a checkout session
      tags:
      - orders
  /orders/find-branches:
    post:
      consumes:
      - application/json
      description: 'Stateless preview: pass items + shipping coordinates, get back
        the ranked list of branches that have every item in stock, sorted by shipping
        fee (then by exact distance). When no branch can fulfill the cart, `options`
        is empty and `missing` names the offending items.'
      parameters:
      - description: Routing input
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/FindBranchesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/FindBranchesResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Find branches that can fulfill the cart
      tags:
      - orders
  /orders/select-branch:
    post:
      consumes:
      - application/json
      description: After /orders/find-branches returned options, the client passes
        the chosen branch_id back here. Server re-verifies eligibility, freezes the
        prices + shipping fee, and stores a Redis session for 10 minutes. Returns
        session_id to confirm with.
      parameters:
      - description: Selection payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/SelectBranchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SelectBranchResponse'
        "409":
          description: BRANCH_NOT_ELIGIBLE or STOCK_CONFLICT
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Lock a quote into a 10-minute checkout session
      tags:
      - orders
