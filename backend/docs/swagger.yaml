basePath: /api/v1
definitions:
  AddItemRequest:
    properties:
      product_id:
        type: string
      quantity:
        maximum: 99
        minimum: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  AddressListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/AddressResponse'
        type: array
    type: object
  AddressResponse:
    properties:
      address:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_default:
        type: boolean
      latitude:
        type: number
      longitude:
        type: number
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  AssignMemberRequest:
    properties:
      user_id:
        type: string
    required:
    - user_id
    type: object
  BranchBrief:
    properties:
      address:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  BranchListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/BranchResponse'
        type: array
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  BranchMembersResponse:
    properties:
      branch_id:
        type: string
      members:
        items:
          $ref: '#/definitions/MemberInfo'
        type: array
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  BranchOptionDTO:
    properties:
      address:
        type: string
      branch_id:
        type: string
      distance_km:
        type: number
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      routing_note:
        type: string
      shipping_fee:
        type: number
      total:
        type: number
    type: object
  BranchProductDetail:
    properties:
      branch_id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: number
      product_active:
        type: boolean
      product_id:
        type: string
      quantity:
        type: integer
      slug:
        type: string
    type: object
  BranchProductResponse:
    properties:
      branch_id:
        type: string
      is_active:
        type: boolean
      product_id:
        type: string
      quantity:
        type: integer
    type: object
  BranchResponse:
    properties:
      address:
        type: string
      created_at:
        type: string
      id:
        type: string
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      status:
        type: string
    type: object
  CartItemResponse:
    properties:
      available:
        type: boolean
      id:
        type: string
      line_total:
        type: number
      name:
        type: string
      price:
        type: number
      product_id:
        type: string
      quantity:
        type: integer
    type: object
  CartResponse:
    properties:
      count:
        type: integer
      items:
        items:
          $ref: '#/definitions/CartItemResponse'
        type: array
      total:
        type: number
    type: object
  CategoryResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      slug:
        type: string
      sort_order:
        type: integer
      updated_at:
        type: string
    type: object
  ChangePasswordRequest:
    properties:
      current_password:
        minLength: 6
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  ConfirmOrderRequest:
    properties:
      session_id:
        type: string
    required:
    - session_id
    type: object
  CreateAddressRequest:
    properties:
      address:
        type: string
      is_default:
        type: boolean
      latitude:
        type: number
      longitude:
        type: number
    required:
    - address
    - latitude
    - longitude
    type: object
  CreateBranchRequest:
    properties:
      address:
        type: string
      lat:
        maximum: 90
        minimum: -90
        type: number
      lng:
        maximum: 180
        minimum: -180
        type: number
      name:
        maxLength: 100
        type: string
    required:
    - address
    - name
    type: object
  CreateCategoryRequest:
    properties:
      name:
        maxLength: 100
        type: string
      sort_order:
        type: integer
    required:
    - name
    type: object
  CreateProductRequest:
    properties:
      category_id:
        type: string
      name:
        maxLength: 100
        type: string
      price:
        type: number
      sort_order:
        type: integer
    required:
    - category_id
    - name
    - price
    type: object
  CreateRoleRequest:
    properties:
      description:
        type: string
      name:
        maxLength: 50
        type: string
    required:
    - name
    type: object
  CreateUserRequest:
    properties:
      branch_id:
        type: string
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        type: string
    required:
    - email
    - full_name
    - password
    - role
    type: object
  CreateUserResponse:
    properties:
      branch:
        $ref: '#/definitions/BranchBrief'
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      role:
        type: string
    type: object
  ErrorResponse:
    properties:
      error:
        properties:
          code:
            type: string
          details: {}
          message:
            type: string
        type: object
    type: object
  FindBranchesItem:
    properties:
      product_id:
        type: string
      quantity:
        maximum: 99
        minimum: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  FindBranchesRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/FindBranchesItem'
        minItems: 1
        type: array
      shipping_address:
        type: string
      shipping_latitude:
        type: number
      shipping_longitude:
        type: number
    required:
    - items
    - shipping_address
    type: object
  FindBranchesResponse:
    properties:
      missing:
        items:
          $ref: '#/definitions/MissingItemDTO'
        type: array
      options:
        items:
          $ref: '#/definitions/BranchOptionDTO'
        type: array
      subtotal:
        type: number
    type: object
  LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  LoginResponse:
    properties:
      access_token:
        type: string
    type: object
  MemberInfo:
    properties:
      display_name:
        type: string
      email:
        type: string
      roles:
        items:
          type: string
        type: array
      user_id:
        type: string
    type: object
  MissingItemDTO:
    properties:
      max_available:
        type: integer
      name:
        type: string
      product_id:
        type: string
      requested:
        type: integer
    type: object
  OrderItemResponse:
    properties:
      id:
        type: string
      line_total:
        type: number
      name:
        type: string
      product_id:
        type: string
      quantity:
        type: integer
      unit_price:
        type: number
    type: object
  OrderListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/OrderSummary'
        type: array
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  OrderResponse:
    properties:
      branch_id:
        type: string
      code:
        type: string
      contact_phone:
        type: string
      discount_total:
        type: number
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/OrderItemResponse'
        type: array
      note:
        type: string
      placed_at:
        type: string
      routing_reason:
        type: string
      shipping_address:
        type: string
      shipping_fee:
        type: number
      shipping_latitude:
        type: number
      shipping_longitude:
        type: number
      subtotal:
        type: number
      total:
        type: number
      user_id:
        type: string
    type: object
  OrderSummary:
    properties:
      branch_id:
        type: string
      branch_name:
        type: string
      code:
        type: string
      id:
        type: string
      placed_at:
        type: string
      shipping_address:
        type: string
      shipping_fee:
        type: number
      subtotal:
        type: number
      total:
        type: number
      user_id:
        type: string
    type: object
  PermissionResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  ProductImageResponse:
    properties:
      alt_text:
        type: string
      id:
        type: string
      product_id:
        type: string
      sort_order:
        type: integer
      url:
        type: string
    type: object
  ProductListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/ProductResponse'
        type: array
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  ProductResponse:
    properties:
      category_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: number
      slug:
        type: string
      sort_order:
        type: integer
      updated_at:
        type: string
    type: object
  ProfileResponse:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      branch:
        $ref: '#/definitions/BranchBrief'
      display_name:
        type: string
      id:
        type: string
      phone:
        type: string
      roles:
        description: |-
          Staff-only enrichment. Omitted for plain customers so their response
          stays unchanged.
        items:
          type: string
        type: array
      user_id:
        type: string
    type: object
  RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  RegisterResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
    type: object
  RoleResponse:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  SeedDemoSummary:
    properties:
      addresses:
        description: saved customer addresses
        type: integer
      branch_products:
        description: (product × branch) availability rows
        type: integer
      branches:
        description: number of branches now in DB
        type: integer
      categories:
        description: number of categories now in DB
        type: integer
      customers:
        description: number of customer accounts
        type: integer
      orders:
        description: placed orders
        type: integer
      products:
        description: number of products now in DB
        type: integer
      skipped:
        description: true if branches already existed → no inserts done
        type: boolean
      staff:
        description: managers + staff combined
        type: integer
    type: object
  SelectBranchItem:
    properties:
      product_id:
        type: string
      quantity:
        maximum: 99
        minimum: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  SelectBranchItemQuoted:
    properties:
      line_total:
        type: number
      name:
        type: string
      product_id:
        type: string
      quantity:
        type: integer
      unit_price:
        type: number
    type: object
  SelectBranchRequest:
    properties:
      branch_id:
        type: string
      contact_phone:
        maxLength: 20
        type: string
      items:
        items:
          $ref: '#/definitions/SelectBranchItem'
        minItems: 1
        type: array
      note:
        maxLength: 500
        type: string
      shipping_address:
        type: string
      shipping_latitude:
        type: number
      shipping_longitude:
        type: number
    required:
    - branch_id
    - items
    - shipping_address
    type: object
  SelectBranchResponse:
    properties:
      branch_id:
        type: string
      branch_name:
        type: string
      distance_km:
        type: number
      expires_at:
        type: string
      items:
        items:
          $ref: '#/definitions/SelectBranchItemQuoted'
        type: array
      session_id:
        type: string
      shipping_fee:
        type: number
      subtotal:
        type: number
      total:
        type: number
      ttl_seconds:
        type: integer
    type: object
  SetPasswordRequest:
    properties:
      password:
        minLength: 6
        type: string
    required:
    - password
    type: object
  UpdateAddressRequest:
    properties:
      address:
        type: string
      latitude:
        type: number
      longitude:
        type: number
    type: object
  UpdateBranchProductRequest:
    properties:
      is_active:
        type: boolean
      quantity:
        minimum: 0
        type: integer
    type: object
  UpdateBranchRequest:
    properties:
      address:
        type: string
      lat:
        maximum: 90
        minimum: -90
        type: number
      lng:
        maximum: 180
        minimum: -180
        type: number
      name:
        maxLength: 100
        type: string
    type: object
  UpdateCategoryRequest:
    properties:
      is_active:
        type: boolean
      name:
        maxLength: 100
        type: string
      sort_order:
        type: integer
    required:
    - name
    type: object
  UpdateItemRequest:
    properties:
      quantity:
        maximum: 99
        minimum: 1
        type: integer
    required:
    - quantity
    type: object
  UpdateProductRequest:
    properties:
      category_id:
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        type: string
      price:
        type: number
      sort_order:
        type: integer
    required:
    - category_id
    - name
    - price
    type: object
  UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      display_name:
        type: string
      phone:
        type: string
    type: object
  UpdateRolePermissionsRequest:
    properties:
      permission_ids:
        items:
          type: string
        type: array
    required:
    - permission_ids
    type: object
  UpdateRoleRequest:
    properties:
      description:
        type: string
      name:
        maxLength: 50
        type: string
    required:
    - name
    type: object
  UpdateStatusRequest:
    properties:
      status:
        enum:
        - active
        - inactive
        type: string
    required:
    - status
    type: object
  UserListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/UserSummary'
        type: array
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  UserSummary:
    properties:
      branch_id:
        type: string
      display_name:
        type: string
      email:
        type: string
      roles:
        items:
          type: string
        type: array
      user_id:
        type: string
    type: object
  VerifyEmailRequest:
    properties:
      otp:
        type: string
      user_id:
        type: string
    required:
    - otp
    - user_id
    type: object
  VerifyEmailResponse:
    properties:
      message:
        type: string
      verified:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: Bakerio bakery marketplace backend API.
  title: Bakerio API
  version: "1.0"
paths:
  /addresses:
    get:
      description: Returns all addresses for the authenticated user, default first.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AddressListResponse'
      security:
      - BearerAuth: []
      summary: List the caller's saved addresses
      tags:
      - addresses
    post:
      consumes:
      - application/json
      description: Creates an address for the caller. First-ever address auto-promotes
        to default; otherwise pass is_default=true to promote it (the previous default
        is demoted in the same tx).
      parameters:
      - description: Address payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateAddressRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/AddressResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Save a new address
      tags:
      - addresses
  /addresses/{id}:
    delete:
      description: Removes the address from the user's catalog. Past orders are unaffected
        because they snapshot the address text on the order row.
      parameters:
      - description: Address ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a saved address (hard delete)
      tags:
      - addresses
    get:
      parameters:
      - description: Address ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AddressResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a saved address
      tags:
      - addresses
    patch:
      consumes:
      - application/json
      description: Partial update for address text and/or lat/long. Use PUT /addresses/{id}/default
        to change which address is the default.
      parameters:
      - description: Address ID
        in: path
        name: id
        required: true
        type: string
      - description: Patch payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateAddressRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AddressResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update an address
      tags:
      - addresses
  /addresses/{id}/default:
    put:
      description: Atomically demotes the previous default and promotes this one.
        Enforced at the DB level via a partial unique index.
      parameters:
      - description: Address ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AddressResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Mark an address as the default
      tags:
      - addresses
  /addresses/default:
    get:
      description: Returns the address flagged as default. 404 if the user has none
        saved.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AddressResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get the caller's default address
      tags:
      - addresses
  /admin/seed-demo:
    post:
      description: 'Populates branches, categories, products, customers, and staff
        for manual API testing. Idempotent: if any branch exists, the call is a no-op
        and `skipped` is true. Super-admin only.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SeedDemoSummary'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Seed sample data (admin)
      tags:
      - dev
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT access token
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/LoginResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Invalidates the current JWT by adding it to the Redis blacklist
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/password:
    patch:
      consumes:
      - application/json
      description: Changes the authenticated user's password after verifying the current
        one
      parameters:
      - description: Change password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change own password
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account and profile in a single transaction
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/RegisterResponse'
        "409":
          description: Email already taken
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /auth/verify:
    post:
      consumes:
      - application/json
      description: Verifies a user's email using the 6-digit OTP sent after registration
      parameters:
      - description: Verify email payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/VerifyEmailResponse'
        "400":
          description: Invalid or expired OTP
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'
