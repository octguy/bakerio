        name: q
        type: string
      - description: Filter by category slug
        in: query
        name: category
        type: string
      - description: Inclusive lower price bound
        in: query
        name: min_price
        type: number
      - description: Inclusive upper price bound
        in: query
        name: max_price
        type: number
      - description: If true, only globally-active products
        in: query
        name: active
        type: boolean
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ProductListResponse'
      summary: List / search products
