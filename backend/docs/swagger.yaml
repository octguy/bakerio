basePath: /api/v1
definitions:
  AssignMemberRequest:
    properties:
      user_id:
        type: string
    required:
    - user_id
    type: object
  BranchBrief:
    properties:
      address:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  BranchMembersResponse:
    properties:
      branch_id:
        type: string
      members:
        items:
          $ref: '#/definitions/MemberInfo'
        type: array
    type: object
  BranchResponse:
    properties:
      address:
        type: string
      created_at:
        type: string
      id:
        type: string
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      status:
        type: string
    type: object
  CategoryResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      parent_id:
        type: string
      slug:
        type: string
      sort_order:
        type: integer
      updated_at:
        type: string
    type: object
  ChangePasswordRequest:
    properties:
      current_password:
        minLength: 6
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  CreateBranchRequest:
    properties:
      address:
        type: string
      lat:
        maximum: 90
        minimum: -90
        type: number
      lng:
        maximum: 180
        minimum: -180
        type: number
      name:
        maxLength: 100
        type: string
    required:
    - address
    - name
    type: object
  CreateCategoryRequest:
    properties:
      name:
        maxLength: 100
        type: string
      parent_id:
        type: string
      sort_order:
        type: integer
    required:
    - name
    type: object
  CreateUserRequest:
    properties:
      branch_id:
        type: string
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        type: string
    required:
    - email
    - full_name
    - password
    - role
    type: object
  CreateUserResponse:
    properties:
      branch:
        $ref: '#/definitions/BranchBrief'
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      role:
        type: string
    type: object
  ErrorResponse:
    properties:
      error:
        properties:
          code:
            type: string
          message:
            type: string
        type: object
    type: object
  LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  LoginResponse:
    properties:
      access_token:
        type: string
    type: object
  MemberInfo:
    properties:
      display_name:
        type: string
      email:
        type: string
      roles:
        items:
          type: string
        type: array
      user_id:
        type: string
    type: object
  ProfileResponse:
    properties:
      address:
        type: string
      avatar_url:
        type: string
      bio:
        type: string
      branch:
        $ref: '#/definitions/BranchBrief'
      display_name:
        type: string
      id:
        type: string
      phone:
        type: string
      roles:
        description: |-
          Staff-only enrichment. Omitted for plain customers so their response
          stays unchanged.
        items:
          type: string
        type: array
      user_id:
        type: string
    type: object
  RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  RegisterResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
    type: object
  SetPasswordRequest:
    properties:
      password:
        minLength: 6
        type: string
    required:
    - password
    type: object
  UpdateBranchRequest:
    properties:
      address:
        type: string
      lat:
        maximum: 90
        minimum: -90
        type: number
      lng:
        maximum: 180
        minimum: -180
        type: number
      name:
        maxLength: 100
        type: string
    type: object
  UpdateCategoryRequest:
    properties:
      is_active:
        type: boolean
      name:
        maxLength: 100
        type: string
      parent_id:
        type: string
      sort_order:
        type: integer
    required:
    - name
    type: object
  UpdateProfileRequest:
    properties:
      address:
        type: string
      avatar_url:
        type: string
      bio:
        type: string
      display_name:
        type: string
      phone:
        type: string
    type: object
  UpdateStatusRequest:
    properties:
      status:
        enum:
        - active
        - inactive
        type: string
    required:
    - status
    type: object
  VerifyEmailRequest:
    properties:
      otp:
        type: string
      user_id:
        type: string
    required:
    - otp
    - user_id
    type: object
  VerifyEmailResponse:
    properties:
      message:
        type: string
      verified:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: Bakerio bakery marketplace backend API.
  title: Bakerio API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT access token
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/LoginResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Invalidates the current JWT by adding it to the Redis blacklist
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/password:
    patch:
      consumes:
      - application/json
      description: Changes the authenticated user's password after verifying the current
        one
      parameters:
      - description: Change password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change own password
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account and profile in a single transaction
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/RegisterResponse'
        "409":
          description: Email already taken
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /auth/verify:
    post:
      consumes:
      - application/json
      description: Verifies a user's email using the 6-digit OTP sent after registration
      parameters:
      - description: Verify email payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/VerifyEmailResponse'
        "400":
          description: Invalid or expired OTP
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Verify email address
      tags:
      - auth
  /branch:
    get:
      description: Retrieve all branches
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/BranchResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get branch list
      tags:
      - branch
    post:
      consumes:
      - application/json
      description: Add a new branch to the system
      parameters:
      - description: Create branch request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateBranchRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/BranchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create branch
      tags:
      - branch
  /branch/{id}:
    get:
      description: Retrieve a single branch by its UUID
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BranchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get branch by ID
      tags:
      - branch
    patch:
      consumes:
      - application/json
      description: Update details of an existing branch
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      - description: Update branch request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateBranchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BranchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update branch
      tags:
      - branch
  /branch/{id}/members:
    get:
      description: List the user IDs assigned to a branch. Admin sees any branch;
        a branch_manager only their own.
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BranchMembersResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: List branch members
      tags:
      - branch
    post:
      consumes:
      - application/json
      description: Assign (or move) a user to a branch. Admin may target any branch;
        a branch_manager only their own.
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      - description: User to assign
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/AssignMemberRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/MemberInfo'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Assign a member to a branch
      tags:
      - branch
  /branch/{id}/members/{userId}:
    delete:
      description: Remove a user's membership. Admin may target any branch; a branch_manager
        only their own.
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove a member from a branch
      tags:
      - branch
  /branch/{id}/status:
    patch:
      consumes:
      - application/json
      description: Activate or deactivate a branch
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      - description: Update status request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update branch status
      tags:
      - branch
  /categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/CategoryResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List all active categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      parameters:
      - description: Create category payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/CategoryResponse'
      security:
      - BearerAuth: []
      summary: Create a product category
      tags:
      - categories
  /categories/{id}:
    delete:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Soft-delete a category
      tags:
      - categories
    get:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CategoryResponse'
      security:
      - BearerAuth: []
      summary: Get category by ID
      tags:
      - categories
    patch:
      consumes:
      - application/json
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      - description: Update category payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CategoryResponse'
      security:
      - BearerAuth: []
      summary: Update a category
      tags:
      - categories
  /profile:
    get:
      description: Returns the authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ProfileResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get own profile
      tags:
      - profile
    patch:
      consumes:
      - application/json
      description: Updates display name, avatar URL, and/or bio for the authenticated
        user
      parameters:
      - description: Update profile payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ProfileResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update own profile
      tags:
      - profile
  /users:
    post:
      consumes:
      - application/json
      description: Admin or manager creates a staff account with a specific role.
        Role must be within the caller's permission level.
      parameters:
      - description: Create user payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/CreateUserResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a staff account
      tags:
      - users
  /users/{id}/password:
    patch:
      consumes:
      - application/json
      description: Admin/manager sets a new password for a staff member without requiring
        the current password
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/SetPasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Set staff password
      tags:
      - users
  /users/{id}/profile:
    get:
      description: Returns the profile of any user. Requires user:view:all or user:manage:branch.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ProfileResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get staff profile
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: Updates display name, avatar URL, and/or bio for a staff member
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Update profile payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ProfileResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update staff profile
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the access token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
