        name: id
        required: true
        type: string
      - description: Role payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/RoleResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
