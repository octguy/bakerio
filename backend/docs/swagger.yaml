        in: query
        name: staff_only
        type: boolean
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/UserListResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Search all users (admin)
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Admin or manager creates a staff account with a specific role.
        Role must be within the caller's permission level.
      parameters:
      - description: Create user payload
        in: body
