      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/RoleResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new role
      tags:
      - rbac
  /roles/{id}:
    get:
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
