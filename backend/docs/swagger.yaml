          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update the set of permissions assigned to a role
      tags:
      - rbac
  /staff:
    get:
      description: Search non-customer accounts. Admin sees all branches; a branch_manager
        is scoped to their own branch.
      parameters:
      - description: Email or display name (ILIKE %q%)
        in: query
        name: q
        type: string
      - description: Filter by exact staff role (branch_manager, branch_staff, product_manager,
          …)
        in: query
        name: role
        type: string
      - description: Filter by branch UUID — ignored for branch_manager callers (forced
          to own branch)
        in: query
        name: branch_id
        type: string
      - description: Default true on /staff. Set false to include customers/guests
          in the result
        in: query
        name: staff_only
        type: boolean
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/UserListResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Search staff (admin or branch manager)
      tags:
      - users
  /users:
    get:
      description: Search across every user (customers + staff). Admin only.
      parameters:
      - description: Email or display name (ILIKE %q%)
        in: query
        name: q
        type: string
      - description: Filter by exact role name
        in: query
        name: role
        type: string
      - description: Filter by branch UUID (user must be a member)
        in: query
        name: branch_id
        type: string
      - description: If true, excludes pure customer/guest accounts (default false
          for /users)
        in: query
        name: staff_only
        type: boolean
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/UserListResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Search all users (admin)
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Admin or manager creates a staff account with a specific role.
        Role must be within the caller's permission level.
      parameters:
      - description: Create user payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/CreateUserResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a staff account
      tags:
      - users
  /users/{id}/password:
    patch:
      consumes:
      - application/json
      description: Admin/manager sets a new password for a staff member without requiring
        the current password
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/SetPasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Set staff password
      tags:
      - users
  /users/{id}/profile:
    get:
      description: Returns the profile of any user. Requires user:view:all or user:manage:branch.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ProfileResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get staff profile
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: Updates display name, avatar URL, and/or bio for a staff member
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Update profile payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ProfileResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update staff profile
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the access token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
