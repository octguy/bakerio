name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend_ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend_ci.yml"
      - ".github/workflows/frontend_cd.yml"
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run check-types
      - run: npm run test:run
      - run: npm run build

  e2e:
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Start backend test stack
        run: docker compose -f ../backend/deployments/docker-compose.test.yml up -d --build app

      - name: Wait for backend test stack
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f ../backend/deployments/docker-compose.test.yml ps
          docker compose -f ../backend/deployments/docker-compose.test.yml logs --tail=200 app
          exit 1

      - run: npm run build
      - run: npm run test:e2e

      - name: Stop backend test stack
        if: always()
        run: docker compose -f ../backend/deployments/docker-compose.test.yml down -v --remove-orphans

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
