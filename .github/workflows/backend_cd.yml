name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-cd
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  docker:
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bakerio:latest
            ${{ secrets.DOCKER_USERNAME }}/bakerio:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pull:
    needs: docker
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Pull latest code and image on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ~/bakerio
            git pull origin main
            cd backend/deployments
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull app

  migrate:
    needs: pull
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Run database migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ~/bakerio/backend/deployments
            docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm migrate

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Restart app container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ~/bakerio/backend/deployments
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d app
            sleep 3
            docker compose -f docker-compose.prod.yml --env-file .env.prod logs app --tail 10

  verify:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            sleep 5
            curl -sf http://localhost:8080/health || \
              (echo "❌ Health check failed" && docker logs bakerio-app --tail 20 && exit 1)
            echo "✅ Backend is healthy"
