name: Frontend CD

on:
  workflow_run:
    workflows: ["Frontend CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: frontend-cd
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate required secrets
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          CPANEL_SSH_PASSPHRASE: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_REMOTE_DIR: ${{ secrets.CPANEL_REMOTE_DIR }}
          API_URL: ${{ secrets.API_URL }}
          BRANDING_URL: ${{ secrets.BRANDING_URL }}
          ORDER_URL: ${{ secrets.ORDER_URL }}
          CONSOLE_URL: ${{ secrets.CONSOLE_URL }}
          CONTACT_ENDPOINT: ${{ secrets.CONTACT_ENDPOINT }}
        run: |
          set -euo pipefail
          for name in \
            DOCKER_USERNAME DOCKER_PASSWORD \
            VPS_HOST VPS_USER VPS_SSH_KEY VPS_PORT \
            FTP_HOST CPANEL_SSH_KEY CPANEL_SSH_PASSPHRASE CPANEL_USER CPANEL_REMOTE_DIR \
            API_URL BRANDING_URL ORDER_URL CONSOLE_URL CONTACT_ENDPOINT; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              exit 1
            fi
          done

  # ─── Branding site → cPanel ───
  build-web:
    needs: [gate, validate]
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx turbo run build --filter=web
        env:
          API_URL: ${{ secrets.API_URL }}
          BRANDING_URL: ${{ secrets.BRANDING_URL }}
          ORDER_URL: ${{ secrets.ORDER_URL }}
          CONSOLE_URL: ${{ secrets.CONSOLE_URL }}
          CONTACT_ENDPOINT: ${{ secrets.CONTACT_ENDPOINT }}
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_BRANDING_URL: ${{ secrets.BRANDING_URL }}
          NEXT_PUBLIC_ORDER_URL: ${{ secrets.ORDER_URL }}
          NEXT_PUBLIC_CONSOLE_URL: ${{ secrets.CONSOLE_URL }}
          NEXT_PUBLIC_CONTACT_ENDPOINT: ${{ secrets.CONTACT_ENDPOINT }}

      - name: Add .htaccess
        run: |
          cat > apps/web/out/.htaccess <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>

          <IfModule mod_headers.c>
            Header set X-Frame-Options "DENY"
            Header set X-Content-Type-Options "nosniff"
            Header set Referrer-Policy "strict-origin-when-cross-origin"
            Header set Permissions-Policy "camera=(), microphone=(), geolocation=()"
            Header set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
          </IfModule>

          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
          </IfModule>

          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 month"
            ExpiresByType image/png "access plus 1 month"
            ExpiresByType image/jpeg "access plus 1 month"
            ExpiresByType text/html "access plus 0 seconds"
          </IfModule>
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: frontend/apps/web/out
          retention-days: 1

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-out
          path: dist

      - name: Deploy to cPanel via SFTP
        env:
          CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          CPANEL_SSH_PASSPHRASE: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          CPANEL_HOST: ${{ secrets.FTP_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_REMOTE_DIR: ${{ secrets.CPANEL_REMOTE_DIR }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq lftp sshpass
          mkdir -p ~/.ssh
          echo "$CPANEL_SSH_KEY" > ~/.ssh/cpanel_key
          chmod 600 ~/.ssh/cpanel_key
          lftp -c "
            set sftp:connect-program 'sshpass -P passphrase -p \"${CPANEL_SSH_PASSPHRASE}\" ssh -i ~/.ssh/cpanel_key -o StrictHostKeyChecking=no -l ${CPANEL_USER}';
            open sftp://${CPANEL_HOST};
            mirror --reverse --delete --parallel=10 --verbose ./dist/ ${CPANEL_REMOTE_DIR};
            quit
          "
          rm -f ~/.ssh/cpanel_key

  # ─── Order + Console → Docker → VPS ───
  docker-order:
    needs: [gate, validate]
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/apps/order/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bakerio-order:latest
            ${{ secrets.DOCKER_USERNAME }}/bakerio-order:${{ github.sha }}
          build-args: |
            API_URL=${{ secrets.API_URL }}
            BRANDING_URL=${{ secrets.BRANDING_URL }}
            ORDER_URL=${{ secrets.ORDER_URL }}
            CONSOLE_URL=${{ secrets.CONSOLE_URL }}
            CONTACT_ENDPOINT=${{ secrets.CONTACT_ENDPOINT }}
          cache-from: type=gha,scope=order
          cache-to: type=gha,mode=max,scope=order

  docker-console:
    needs: [gate, validate]
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/apps/console/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bakerio-console:latest
            ${{ secrets.DOCKER_USERNAME }}/bakerio-console:${{ github.sha }}
          build-args: |
            API_URL=${{ secrets.API_URL }}
            BRANDING_URL=${{ secrets.BRANDING_URL }}
            ORDER_URL=${{ secrets.ORDER_URL }}
            CONSOLE_URL=${{ secrets.CONSOLE_URL }}
            CONTACT_ENDPOINT=${{ secrets.CONTACT_ENDPOINT }}
          cache-from: type=gha,scope=console
          cache-to: type=gha,mode=max,scope=console

  deploy-apps:
    needs: [docker-order, docker-console]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Pull and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            git config --global --add safe.directory /home/deploy/bakerio
            cd /home/deploy/bakerio
            git fetch origin main
            git reset --hard origin/main
            cd deploy
            grep -v '^IMAGE_TAG=' .env.prod > .env.prod.tmp || true
            printf 'IMAGE_TAG=%s\n' '${{ github.sha }}' >> .env.prod.tmp
            mv .env.prod.tmp .env.prod
            # Frontend deploy only touches the order/console images. --no-deps keeps
            # Compose from resolving/pulling the backend `app` image (owned by
            # Backend CD via APP_IMAGE_TAG), which would 404 on a frontend SHA.
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull order console
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps order console
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps --force-recreate nginx
            docker exec bakerio-nginx nginx -t
            docker exec bakerio-nginx nginx -s reload
            sleep 3
            docker compose -f docker-compose.prod.yml --env-file .env.prod logs order console nginx --tail 20

  verify-apps:
    needs: deploy-apps
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            sleep 30

            # Assert each port serves the EXPECTED app. A plain liveness check
            # can't catch an order/console image swap (both return 200), so we
            # match the app identity reported by /api/health.
            check() {
              local label="$1" target="$2" expected="$3"
              # Strip trailing slashes so a stray slash in *_URL secrets can't
              # produce `//api/health` (which returns the literal "/api/health").
              target="${target%/}"
              local body
              body="$(curl -sf "$target/api/health")" || { echo "❌ $label unreachable ($target)"; exit 1; }
              case "$body" in
                *"\"app\":\"$expected\""*) echo "✅ $label healthy ($expected)" ;;
                *) echo "❌ $label served WRONG app — expected '$expected', got: $body"; exit 1 ;;
              esac
            }

            check "Order (local)" "http://localhost:3001" "order"
            check "Console (local)" "http://localhost:3002" "console"
            check "Order (public)" "${{ secrets.ORDER_URL }}" "order"
            check "Console (public)" "${{ secrets.CONSOLE_URL }}" "console"
