name: Frontend CD

on:
  workflow_run:
    workflows: ["Frontend CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: frontend-cd
  cancel-in-progress: false

jobs:
  deploy-web:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production-web
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx turbo run build --filter=web

      - name: Add .htaccess
        run: |
          cat > apps/web/out/.htaccess <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>

          <IfModule mod_headers.c>
            Header set X-Frame-Options "DENY"
            Header set X-Content-Type-Options "nosniff"
            Header set Referrer-Policy "strict-origin-when-cross-origin"
            Header set Permissions-Policy "camera=(), microphone=(), geolocation=()"
            Header set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
          </IfModule>

          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
          </IfModule>

          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 month"
            ExpiresByType image/png "access plus 1 month"
            ExpiresByType image/jpeg "access plus 1 month"
            ExpiresByType text/html "access plus 0 seconds"
          </IfModule>
          EOF

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./frontend/apps/web/out/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state.json

  deploy-apps:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push order image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/apps/order/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bakerio-order:latest
            ${{ secrets.DOCKER_USERNAME }}/bakerio-order:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push admin image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/apps/admin/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bakerio-admin:latest
            ${{ secrets.DOCKER_USERNAME }}/bakerio-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/bakerio/backend/deployments
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull order admin
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d order admin nginx
            sleep 3
            docker compose -f docker-compose.prod.yml --env-file .env.prod logs order admin --tail 5
