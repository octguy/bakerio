name: frontend pipeline

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Optional: tie this to a protected GitHub Environment for manual approval / scoped secrets.
    # environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Add SPA .htaccess (Apache history fallback)
        run: |
          cat > dist/.htaccess <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>

          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
          </IfModule>

          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css                 "access plus 1 year"
            ExpiresByType application/javascript   "access plus 1 year"
            ExpiresByType image/svg+xml            "access plus 1 month"
            ExpiresByType image/png                "access plus 1 month"
            ExpiresByType image/jpeg               "access plus 1 month"
            ExpiresByType text/html                "access plus 0 seconds"
          </IfModule>
          EOF

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # cPanel usually supports FTPS on port 21. Use "ftp" only if your host has no TLS.
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          # Don't wipe files we didn't put there (e.g. cgi-bin, .well-known/).
          dangerous-clean-slate: false
          # Speed up incremental deploys.
          state-name: .ftp-deploy-sync-state.json
          log-level: standard
